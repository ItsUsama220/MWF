<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog | Marketing With a Flair</title>
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="./blog.css">
</head>
<body data-page="blog" data-root="../.." data-blogs-link="../Blogs/blogs.html" data-contact-link="../Contact/contact.html">
  <div data-mwf-header></div>

  <main class="mwf-page-shell mwf-blog-page">
    <section class="mwf-blog-hero" id="top" aria-labelledby="mwf-blog-title">
      <div class="mwf-section-shell mwf-blog-hero__shell">
        <div class="mwf-blog-hero__content" id="mwf-blog-hero-content"></div>
      </div>
    </section>

    <section class="mwf-gradient-surface mwf-blog-article" aria-label="Article content">
      <div class="mwf-section-shell mwf-blog-article__shell">
        <article class="mwf-blog-article__main" id="mwf-blog-article-main"></article>
        <aside class="mwf-glass-card mwf-blog-article__toc" id="mwf-blog-toc"></aside>
      </div>
    </section>

    <section class="mwf-gradient-surface mwf-blog-related" aria-labelledby="mwf-blog-related-title">
      <div class="mwf-section-shell mwf-section-shell--stacked">
        <div class="mwf-blog-related__intro" data-page-reveal data-reveal-y="12">
          <p class="mwf-section-eyebrow">More reading</p>
          <h2 class="mwf-section-title" id="mwf-blog-related-title">More marketing guidance from MWF.</h2>
        </div>
        <div class="mwf-blog-related__grid" id="mwf-blog-related-grid"></div>
      </div>
    </section>
  </main>

  <div data-mwf-footer></div>

  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/blog-data.js"></script>
  <script src="./blog.js"></script>
  <script src="../../assets/js/vendor/gsap.min.js"></script>
  <script src="../../assets/js/vendor/ScrollTrigger.min.js"></script>
  <script src="../../assets/js/scripts.js"></script>
  <script src="../../assets/js/page-reveals.js"></script>
</body>
</html>
